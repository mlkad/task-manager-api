version: "3.8"
services:
  app:
    build: .
    ports:
      - "8083:8083"
    environment:
      - DB_URL=postgres://postgres:password@db:5432/taskdb?sslmode=disable
    depends_on:
      db:
        condition: service_healthy # ждём пока БД фготова принимать соединения
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: taskdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
